<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feira Troca - Administração</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        if (sessionStorage.getItem("dora_auth") !== "autorizado") {
            window.location.replace("index.html");
        }
    </script>
</head>

<body>
    <div class="container" style="max-width: 400px;">
        <h3>🔐 Controle de Saldo</h3>

        <div class="cliente-info">
            <div class="busca-container">
                <input type="text" id="nomeCliente" placeholder="RA ou CPF do Aluno" inputmode="numeric" maxlength="11"
                    oninput="this.value = this.value.replace(/\D/g, '')">
                <button onclick="buscarPorIdUser()" class="btn-buscar">Buscar</button>
            </div>
            
            <button onclick="abrirLeitorQR()" style="width: 100%; margin-top: 10px; padding: 14px; background: #333; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.95rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect>
                    <path d="M7 7h.01"></path><path d="M17 7h.01"></path><path d="M17 17h.01"></path><path d="M7 17h.01"></path>
                </svg>
                Ler QR Code
            </button>

            <!-- Área do Scanner de QR Code -->
            <div id="scanner-container" style="display: none; margin-top: 15px; background: #000; border-radius: 15px; overflow: hidden; position: relative; border: 4px solid #333;">
                <div id="reader" style="width: 100%;"></div>
                <button onclick="fecharLeitorQR()" style="position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; cursor: pointer;">X</button>
            </div>

            <div class="placar">
                <span id="nomeExibicao" style="font-size: 0.85rem; color: #888; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Aguardando RA/CPF</span>
                <span id="saldoPontos">0</span>
                <span style="font-size: 0.8rem; color: #aaa; font-weight: 600;">Saldo Atual</span>
            </div>

            <div class="controles">
                <!-- Fileira de Remoção (Vermelha) -->
                <div class="linha-controles">
                    <button onclick="adicionarAosPontosParaEnviar(-5)" class="btn-subtrair">-5</button>
                    <button onclick="adicionarAosPontosParaEnviar(-10)" class="btn-subtrair">-10</button>
                    <button onclick="adicionarAosPontosParaEnviar(-30)" class="btn-subtrair">-30</button>
                </div>

                <!-- Fileira de Adição (Verde) -->
                <div class="linha-controles">
                    <button onclick="adicionarAosPontosParaEnviar(5)" class="btn-adicionar">+5</button>
                    <button onclick="adicionarAosPontosParaEnviar(10)" class="btn-adicionar">+10</button>
                    <button onclick="adicionarAosPontosParaEnviar(30)" class="btn-adicionar">+30</button>
                </div>

                <div style="background: #fff; padding: 15px; border-radius: 12px; border: 1px dashed #ccc; margin-top: 10px;">
                    <p id="labelStatusPontos" style="margin: 0; font-size: 0.75rem; color: #888; text-transform: uppercase; font-weight: 700;">Aguardando Seleção</p>
                    <p id="previewPontos" style="margin: 5px 0; font-size: 1.5rem; font-weight: 800; color: #333;">0</p>
                    <button id="btnSalvarPontos" onclick="enviarPontos()" class="btn-salvar" disabled>Confirmar Operação</button>
                </div>
            </div>

            <div id="historicoTransacoes" class="extrato-container" style="display: none;">
                <h4 style="font-size: 0.8rem; text-transform: uppercase; color: #999; margin-bottom: 12px; font-weight: 800; letter-spacing: 1px;">Histórico de Movimentações</h4>
                <div id="listaExtrato"></div>
            </div>

            <div class="navegacao" style="margin-top: 30px; display: flex; flex-direction: column; gap: 8px; align-items: center;">
                <a href="index.html"
                    style="text-decoration: none; width: 100%; box-sizing: border-box; background-color: #eee; color: #444; padding: 14px; text-align: center; border-radius: 12px; font-weight: 700; font-size: 0.95rem;">⬅️ Voltar ao Início</a>
                <button onclick="fazerLogout()" style="background: none; border: none; color: #999; font-size: 0.75rem; text-decoration: underline; cursor: pointer; margin-top: 5px;">Encerrar Sessão</button>
            </div>
        </div>

        <div class="rodape-creditos">
            Desenvolvido por <strong>José Oliveira</strong>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div id="loadingIcon" class="spinner"></div>
        <div id="statusIcon" class="icon-status" style="font-size: 5rem;"></div>
        <span id="loadingTexto">Processando...</span>
        <p id="loadingDesc" style="font-size: 0.9rem; color: #666; margin-top: 10px; max-width: 250px;">Realizando transação segura no banco de dados.</p>
        <button id="btnFecharOverlay" class="btn-fechar-overlay" onclick="fecharOverlay()" style="border-radius: 12px; font-weight: 700;">Entendido</button>
    </div>

    <script src="script.js"></script>
    <script>
        let html5QrCode;

        async function abrirLeitorQR() {
            const container = document.getElementById('scanner-container');
            container.style.display = 'block';
            
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config,
                    (decodedText) => {
                        // Sucesso na leitura
                        fecharLeitorQR();
                        processarLinkQR(decodedText);
                    }
                );
            } catch (err) {
                alert("Erro ao abrir a câmera: " + err);
                container.style.display = 'none';
            }
        }

        function fecharLeitorQR() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanner-container').style.display = 'none';
                }).catch(() => {
                    document.getElementById('scanner-container').style.display = 'none';
                });
            } else {
                document.getElementById('scanner-container').style.display = 'none';
            }
        }

        function processarLinkQR(texto) {
            try {
                // Tenta extrair o idUser da URL escaneada
                const url = new URL(texto);
                const idUser = url.searchParams.get("idUser");
                if (idUser) {
                    document.getElementById('nomeCliente').value = idUser;
                    buscarPorIdUser();
                } else {
                    alert("QR Code inválido ou sem ID de usuário.");
                }
            } catch (e) {
                // Se não for uma URL, tenta usar o texto puro caso seja apenas o ID
                if (texto.length >= 8 && texto.length <= 11) {
                    document.getElementById('nomeCliente').value = texto.replace(/\D/g, '');
                    buscarPorIdUser();
                } else {
                    alert("O conteúdo lido não parece ser um código válido.");
                }
            }
        }

        // Lógica de Carregamento Automático via URL (existente)
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const idUserUrl = params.get('idUser');
            if (idUserUrl) {
                const inputBusca = document.getElementById('nomeCliente');
                if (inputBusca) {
                    inputBusca.value = idUserUrl;
                    buscarPorIdUser();
                }
            }
        };
    </script>
</body>

</html>
