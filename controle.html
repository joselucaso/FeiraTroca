<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feira Troca - Controle</title>
    <link rel="stylesheet" href="style.css">

    <script>
        if (sessionStorage.getItem("dora_auth") !== "autorizado") {
            window.location.replace("index.html");
        }
    </script>
</head>

<body>
    <div class="container">
        <div class="cliente-info">
            <div class="busca-container">
                <input type="text" id="nomeCliente" placeholder="Digite o RA ou CPF..." inputmode="numeric" maxlength="11"
                    oninput="this.value = this.value.replace(/\D/g, '')">
                <button onclick="buscarPorIdUser()" class="btn-buscar">🔍 Buscar</button>
            </div>

            <div class="info-cliente">
                <p style="font-size: 0.9rem; font-weight: normal; margin-bottom: 8px; color: #555;">
                    Usuário: <span id="nomeExibicao" style="font-weight: normal; color: #333;">---</span>
                </p>
                <p>Saldo: <span id="saldoPontos">0</span></p>

                <p id="feedbackCesta" style="font-weight: bold; margin-top: -10px; display: none;">+0</p>
            </div>

            <div class="controles">
                <div class="linha-controles">
                    <button onclick="acumularPontos(-5)" class="btn-subtrair">-5</button>
                    <button onclick="acumularPontos(-10)" class="btn-subtrair">-10</button>
                    <button onclick="acumularPontos(-30)" class="btn-subtrair">-30</button>
                </div>
                <div class="linha-controles">
                    <button onclick="acumularPontos(5)" class="btn-adicionar">+5</button>
                    <button onclick="acumularPontos(10)" class="btn-adicionar">+10</button>
                    <button onclick="acumularPontos(30)" class="btn-adicionar">+30</button>
                </div>

                <button id="btnSalvarPontos" onclick="enviarPontos()" class="btn-salvar" disabled
                    style="margin-top: 15px;">Salvar Alterações</button>
            </div>

            <div id="historicoTransacoes" class="extrato-container" style="display: none;">
                <h4>Histórico de Movimentação</h4>
                <div id="listaExtrato"></div>
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <div class="navegacao" style="margin-top: 20px; display: flex; flex-direction: column; gap: 5px; align-items: center;">
                <a href="index.html"
                    style="text-decoration: none; display: block; background-color: #6c757d; color: white; padding: 12px; text-align: center; border-radius: 6px; font-weight: bold;">⬅️
                    Voltar para a Home</a>
                <button onclick="fazerLogout()" style="background: none; border: none; color: #999; font-size: 0.75rem; text-decoration: underline; cursor: pointer; margin-top: 10px;">Encerrar Sessão</button>
            </div>

            <div class="rodape-creditos">
                Desenvolvido por <strong>José Oliveira</strong>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div id="loadingIcon" class="spinner"></div>
        <div id="statusIcon" class="icon-status"></div>
        <span id="loadingTexto">Buscando Informações...</span>
        <p id="loadingDesc" style="font-size: 0.8rem; color: #888; margin-top: 10px;">Acessando Banco de Dados</p>
        <button id="btnFecharOverlay" class="btn-fechar-overlay" onclick="fecharOverlay()">Voltar</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
