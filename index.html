<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feira Troca - Bem Vindo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container" style="text-align: center; padding: 40px 20px;">
        
        <div style="margin-bottom: 25px; padding: 20px; background: #ffffff; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); display: inline-block; align-self: center; border: 1px solid #f0f0f0;">
            <div style="padding: 8px; border: 2px solid #28a745; border-radius: 12px; display: inline-block;">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://feiratroca.netlify.app/index.html" 
                     alt="QR Code do Site" 
                     style="display: block; width: 150px; height: 150px; border-radius: 4px;">
            </div>
            <p style="font-size: 0.8rem; color: #28a745; margin-top: 10px; margin-bottom: 0; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;">Compartilhe</p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 15px;">
            <a href="consulta.html" class="btn-portal" style="background-color: #28a745;">Saldo</a>
            <a href="cadastro.html" class="btn-portal" style="background-color: #dc3545;">Cadastro</a>
            <a href="#" onclick="verificarSenha('controle.html')" class="btn-portal"
                style="background-color: #007bff;">Administração</a>
        </div>

        <div class="rodape-creditos">
            Desenvolvido por <strong>José Oliveira</strong>
        </div>
    </div>

    <div id="modalSenha"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 999;">
        <div
            style="background: white; padding: 25px; border-radius: 8px; text-align: center; width: 90%; max-width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);">
            <h3 style="margin-top: 0; color: #333; margin-bottom: 5px;">🔐 Área Restrita</h3>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">Digite o seu RA ou CPF:</p>

            <input type="text" id="inputIdAdmin" placeholder="Somente números" inputmode="numeric" maxlength="11"
                style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; text-align: center; font-size: 1.1rem; letter-spacing: 2px;">

            <input type="password" id="inputSenhaAdmin" placeholder="Sua Senha"
                onkeypress="if(event.key === 'Enter') confirmarAdmin()"
                style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; text-align: center; font-size: 1.2rem; letter-spacing: 4px;">

            <div style="text-align: left; margin-bottom: 15px; font-size: 0.85rem; color: #666; display: flex; align-items: center; gap: 5px; justify-content: center;">
                <input type="checkbox" id="checkLembrar" style="width: auto; margin: 0;">
                <label for="checkLembrar" style="cursor: pointer;">Lembrar meu RA/CPF</label>
            </div>

            <div style="display: flex; gap: 10px;">
                <button onclick="fecharModal()"
                    style="flex: 1; padding: 12px; background: #6c757d; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Cancelar</button>
                <button id="btnAcessarAdmin" onclick="confirmarAdmin()"
                    style="flex: 1; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Acessar</button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div id="loadingIcon" class="spinner"></div>
        <div id="statusIcon" class="icon-status"></div>
        <span id="loadingTexto">Processando...</span>
        <p id="loadingDesc" style="font-size: 0.8rem; color: #888; margin-top: 10px;">Aguarde um momento</p>
        <button id="btnFecharOverlay" class="btn-fechar-overlay" onclick="fecharOverlay()">Voltar</button>
    </div>

    <script src="script.js"></script>
    <script>
        let destinoGlobal = "";

        function verificarSenha(destinoUrl) {
            if (sessionStorage.getItem("dora_auth") === "autorizado") {
                window.location.href = destinoUrl;
                return;
            }
            destinoGlobal = destinoUrl;
            
            const salvo = localStorage.getItem("dora_admin_id");
            if (salvo) {
                document.getElementById('inputIdAdmin').value = salvo;
                document.getElementById('checkLembrar').checked = true;
                setTimeout(() => document.getElementById('inputSenhaAdmin').focus(), 100);
            } else {
                document.getElementById('inputIdAdmin').value = '';
                document.getElementById('checkLembrar').checked = false;
                setTimeout(() => document.getElementById('inputIdAdmin').focus(), 100);
            }
            
            document.getElementById('inputSenhaAdmin').value = '';
            document.getElementById('modalSenha').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalSenha').style.display = 'none';
        }

        async function confirmarAdmin() {
            const idInput = document.getElementById('inputIdAdmin').value.replace(/\D/g, '');
            const senhaInput = document.getElementById('inputSenhaAdmin').value.trim();

            if (idInput.length !== 8 && idInput.length !== 11) {
                showStatus(false, "Formato Inválido", "RA deve ter 8 números ou CPF deve ter 11 números.");
                return;
            }
            if (!senhaInput) {
                showStatus(false, "Erro de Acesso", "Digite a senha do administrador.");
                return;
            }

            fecharModal();
            abrirLoading("Verificando...", "Validando credenciais");

            try {
                const response = await fetch(`${URL_PLANILHA}?acao=login&idUser=${idInput}&senha=${encodeURIComponent(senhaInput)}`);
                const texto = await response.text();

                if (texto === "Aprovado") {
                    if (document.getElementById('checkLembrar').checked) {
                        localStorage.setItem("dora_admin_id", idInput);
                    } else {
                        localStorage.removeItem("dora_admin_id");
                    }
                    sessionStorage.setItem("dora_auth", "autorizado");
                    sessionStorage.setItem("dora_admin_id", idInput);
                    sessionStorage.setItem("dora_admin_pass", senhaInput);
                    
                    showStatus(true, "Acesso Liberado!", "Redirecionando...");
                    setTimeout(() => window.location.href = destinoGlobal, 1000);
                } else if (texto === "Não encontrado") {
                    showStatus(false, "Usuário não encontrado", "Este RA ou CPF não possui cadastro administrativo.");
                } else {
                    showStatus(false, "Acesso Negado", "Senha incorreta ou perfil sem privilégios.");
                }
            } catch (error) {
                showStatus(false, "Erro no Servidor", "Não foi possível validar o login.");
            }
        }
    </script>
</body>

</html>
