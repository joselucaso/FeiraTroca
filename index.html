<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feira Troca - Bem Vindo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        
        <div style="margin-bottom: 30px; padding: 20px; background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); display: inline-block; border: 1px solid rgba(0,0,0,0.03);">
            <div style="padding: 10px; border: 2px solid #28a745; border-radius: 16px; display: inline-block; background: #fafafa;">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://joselucaso.github.io/FeiraTroca/" 
                     alt="QR Code do Site" 
                     style="display: block; width: 160px; height: 160px; border-radius: 8px;">
            </div>
            <p style="font-size: 0.75rem; color: #28a745; margin-top: 12px; margin-bottom: 0; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">Compartilhe</p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <a href="consulta.html" class="btn-portal" style="background: linear-gradient(135deg, #28a745 0%, #218838 100%);">📊 Saldo</a>
            <a href="cadastro.html" class="btn-portal" style="background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);">👤 Cadastro</a>
            <a href="#" onclick="verificarSenha('controle.html')" class="btn-portal" style="background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);">🔐 Administração</a>
        </div>

        <div class="rodape-creditos">
            Desenvolvido por <strong>José Oliveira</strong><br>
            <span style="opacity: 0.5; font-size: 0.65rem;">v1.0.0</span>
        </div>
    </div>

    <!-- Modal de Senha Premium -->
    <div id="modalSenha"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 999; animation: fadeIn 0.3s ease;">
        <div
            style="background: white; padding: 35px 25px; border-radius: 20px; text-align: center; width: 90%; max-width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);">
            <h3 style="margin-top: 0; color: #1a1a1a; margin-bottom: 10px;">🔐 Área Restrita</h3>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 25px;">Acesse com seu RA ou CPF</p>

            <input type="text" id="inputIdAdmin" placeholder="RA ou CPF" inputmode="numeric" maxlength="11" 
                   style="text-align: center; font-weight: 600; letter-spacing: 1px;">

            <input type="password" id="inputSenhaAdmin" placeholder="Sua Senha" onkeypress="if(event.key === 'Enter') confirmarAdmin()"
                   style="text-align: center; font-weight: 600; letter-spacing: 5px;">

            <div style="text-align: left; margin-bottom: 20px; font-size: 0.85rem; color: #666; display: flex; align-items: center; gap: 8px; justify-content: center;">
                <input type="checkbox" id="checkLembrar" style="width: 16px; height: 16px; margin: 0; cursor: pointer;">
                <label for="checkLembrar" style="cursor: pointer; font-weight: 500;">Lembrar meu RA/CPF</label>
            </div>

            <div style="display: flex; gap: 12px;">
                <button onclick="fecharModal()"
                    style="flex: 1; padding: 14px; background: #eee; color: #444; border: none; border-radius: 10px; cursor: pointer; font-weight: 700;">Voltar</button>
                <button id="btnAcessarAdmin" onclick="confirmarAdmin()"
                    style="flex: 1; padding: 14px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 700;">Acessar</button>
            </div>
        </div>
    </div>

    <!-- Overlay de Status Premium -->
    <div id="loadingOverlay" class="loading-overlay">
        <div id="loadingIcon" class="spinner"></div>
        <div id="statusIcon" class="icon-status" style="font-size: 5rem;"></div>
        <span id="loadingTexto">Processando...</span>
        <p id="loadingDesc" style="font-size: 0.9rem; color: #666; margin-top: 10px; max-width: 250px;">Aguarde um momento enquanto validamos os dados.</p>
        <button id="btnFecharOverlay" class="btn-fechar-overlay" onclick="fecharOverlay()" style="border-radius: 12px; font-weight: 700;">Entendido</button>
    </div>

    <script src="script.js"></script>
    <script>
        let destinoGlobal = "";

        function verificarSenha(destinoUrl) {
            if (sessionStorage.getItem("dora_auth") === "autorizado") {
                window.location.href = destinoUrl;
                return;
            }
            destinoGlobal = destinoUrl;
            
            const salvo = localStorage.getItem("dora_admin_id");
            if (salvo) {
                document.getElementById('inputIdAdmin').value = salvo;
                document.getElementById('checkLembrar').checked = true;
                setTimeout(() => document.getElementById('inputSenhaAdmin').focus(), 100);
            } else {
                document.getElementById('inputIdAdmin').value = '';
                document.getElementById('checkLembrar').checked = false;
                setTimeout(() => document.getElementById('inputIdAdmin').focus(), 100);
            }
            
            document.getElementById('inputSenhaAdmin').value = '';
            document.getElementById('modalSenha').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalSenha').style.display = 'none';
        }

        async function confirmarAdmin() {
            const idInput = document.getElementById('inputIdAdmin').value.replace(/\D/g, '');
            const senhaInput = document.getElementById('inputSenhaAdmin').value.trim();

            if (idInput.length !== 8 && idInput.length !== 11) {
                showStatus(false, "Formato Inválido", "RA deve ter 8 números ou CPF deve ter 11 números.");
                return;
            }
            if (!senhaInput) {
                showStatus(false, "Faltou a Senha", "Informe sua senha para continuar.");
                return;
            }

            fecharModal();
            abrirLoading("Autenticando...", "Validando suas credenciais de administrador.");

            try {
                const response = await fetch(`${URL_PLANILHA}?acao=login&idUser=${idInput}&senha=${encodeURIComponent(senhaInput)}`);
                const texto = await response.text();

                if (texto === "Aprovado") {
                    if (document.getElementById('checkLembrar').checked) {
                        localStorage.setItem("dora_admin_id", idInput);
                    } else {
                        localStorage.removeItem("dora_admin_id");
                    }
                    sessionStorage.setItem("dora_auth", "autorizado");
                    sessionStorage.setItem("dora_admin_id", idInput);
                    sessionStorage.setItem("dora_admin_pass", senhaInput);
                    
                    showStatus(true, "Bem-vindo!", "Acesso liberado. Redirecionando...");
                    setTimeout(() => window.location.href = destinoGlobal, 1000);
                } else if (texto === "Não encontrado") {
                    showStatus(false, "Não Encontrado", "Este RA/CPF não possui perfil administrativo.");
                } else {
                    showStatus(false, "Senha Incorreta", "Por favor, verifique seus dados e tente novamente.");
                }
            } catch (error) {
                showStatus(false, "Erro de Conexão", "Não foi possível conectar ao servidor. Tente novamente.");
            }
        }
    </script>
</body>

</html>
