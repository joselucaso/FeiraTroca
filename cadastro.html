<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feira Troca - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h3 style="color: #6c757d; margin-top: -10px; margin-bottom: 20px;">Novo Usuário</h3>

        <input type="text" id="regIdUser" placeholder="Digite o RA ou CPF..." inputmode="numeric" maxlength="11"
            oninput="this.value = this.value.replace(/\D/g, '')">
        <input type="text" id="regNome" placeholder="Digite o Nome Completo..."
            oninput="this.value = this.value.toUpperCase()">

        <button onclick="salvarCliente()" class="btn-salvar">Salvar</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <div class="navegacao" style="margin-top: 20px; display: flex; flex-direction: column; gap: 5px; align-items: center;">
            <a href="index.html"
                style="text-decoration: none; display: block; background-color: #6c757d; color: white; padding: 12px; text-align: center; border-radius: 6px; font-weight: bold;">⬅️
                Voltar para a Home</a>
        </div>

        <div class="rodape-creditos">
            Desenvolvido por <strong>José Oliveira</strong>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div id="loadingIcon" class="spinner"></div>
        <div id="statusIcon" class="icon-status"></div>
        <span id="loadingTexto">Salvando no Sistema...</span>
        <p id="loadingDesc" style="font-size: 0.8rem; color: #888; margin-top: 10px;">Isso pode levar alguns segundos</p>
        <button id="btnFecharOverlay" class="btn-fechar-overlay" onclick="fecharOverlay()">Voltar</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
